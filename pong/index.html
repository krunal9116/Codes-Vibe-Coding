<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong – Neon Showdown</title>
    <meta name="description" content="A stunning neon Pong game with AI opponent, 2-player mode, glowing trails, and particle effects.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ====== MENU SCREEN ====== -->
    <div class="screen active" id="menuScreen">
        <div class="menu-wrap">
            <div class="brand">
                <div class="brand-icon">🏓</div>
                <h1 class="brand-title">NEON<span>PONG</span></h1>
                <p class="brand-sub">Smash • Rally • Dominate</p>
            </div>

            <!-- Mode Selection -->
            <div class="mode-picker">
                <span class="picker-label">Game Mode</span>
                <div class="picker-btns">
                    <button class="mode-btn active" id="mode1P" onclick="pickMode('1P', this)">🤖 1 Player</button>
                    <button class="mode-btn" id="mode2P" onclick="pickMode('2P', this)">👥 2 Players</button>
                </div>
            </div>

            <!-- Difficulty (1P only) -->
            <div class="diff-picker" id="diffPicker">
                <span class="picker-label">AI Difficulty</span>
                <div class="picker-btns">
                    <button class="diff-btn" onclick="pickDiff('easy', this)">Easy</button>
                    <button class="diff-btn active" onclick="pickDiff('medium', this)">Medium</button>
                    <button class="diff-btn" onclick="pickDiff('hard', this)">Hard</button>
                </div>
            </div>

            <button class="btn-start" id="btnStart" onclick="startGame()">
                <span class="btn-glow"></span>
                ▶ START GAME
            </button>

            <div class="menu-score-box">
                <span class="msb-label">🏆 Best Streak</span>
                <span class="msb-value" id="menuBest">0</span>
            </div>

            <div class="controls-hint" id="controlsHint">
                <p class="hint-text">⬆️ W/S to move &nbsp; | &nbsp; ⏸️ Esc to pause</p>
            </div>
        </div>
    </div>

    <!-- ====== GAME SCREEN ====== -->
    <div class="screen" id="gameScreen">
        <div class="game-hud">
            <div class="hud-player hud-p1">
                <span class="hud-lbl" id="p1Label">Player 1</span>
                <span class="hud-v hud-score-cyan" id="p1Score">0</span>
            </div>
            <div class="hud-center">
                <span class="hud-vs">VS</span>
                <span class="hud-match" id="hudMatch">First to 7</span>
            </div>
            <div class="hud-player hud-p2">
                <span class="hud-lbl" id="p2Label">CPU</span>
                <span class="hud-v hud-score-magenta" id="p2Score">0</span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="rally-popup" id="rallyPopup"></div>
    </div>

    <!-- ====== COUNTDOWN OVERLAY ====== -->
    <div class="overlay" id="countdownOverlay">
        <div class="countdown-num" id="countdownNum">3</div>
    </div>

    <!-- ====== GAME OVER OVERLAY ====== -->
    <div class="overlay" id="gameOverOverlay">
        <div class="overlay-card">
            <div class="ov-emoji" id="goEmoji">🏆</div>
            <h2 class="ov-title go-title" id="goTitle">Player 1 Wins!</h2>
            <div class="score-row">
                <div class="sr-box">
                    <span class="sr-lbl" id="goP1Label">Player 1</span>
                    <span class="sr-val sr-cyan" id="goP1Score">0</span>
                </div>
                <div class="sr-box">
                    <span class="sr-lbl" id="goP2Label">CPU</span>
                    <span class="sr-val sr-magenta" id="goP2Score">0</span>
                </div>
            </div>
            <button class="btn-start btn-next" onclick="startGame()">🔄 PLAY AGAIN</button>
            <button class="btn-menu" onclick="goToMenu()">Main Menu</button>
        </div>
    </div>

    <!-- ====== PAUSE OVERLAY ====== -->
    <div class="overlay" id="pauseOverlay">
        <div class="overlay-card">
            <div class="ov-emoji">⏸️</div>
            <h2 class="ov-title">Paused</h2>
            <button class="btn-start btn-next" onclick="resumeGame()">▶ RESUME</button>
            <button class="btn-menu" onclick="goToMenu()">Main Menu</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
