<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake – The Game</title>
    <meta name="description" content="A premium neon-themed snake game with power-ups, trails, and leaderboard.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ====== MENU SCREEN ====== -->
    <div class="screen active" id="menuScreen">
        <div class="menu-wrap">
            <div class="neon-logo">
                <span class="logo-icon">🐍</span>
                <h1 class="logo-text">NEON SNAKE</h1>
                <p class="logo-sub">Eat. Grow. Survive.</p>
            </div>

            <div class="menu-actions">
                <button class="btn-play" id="btnPlay" onclick="startGame()">
                    <span class="btn-icon">▶</span> START GAME
                </button>

                <div class="difficulty-selector">
                    <span class="diff-label">Difficulty</span>
                    <div class="diff-options">
                        <button class="diff-btn active" data-diff="easy" onclick="setDifficulty('easy', this)">Easy</button>
                        <button class="diff-btn" data-diff="medium" onclick="setDifficulty('medium', this)">Medium</button>
                        <button class="diff-btn" data-diff="hard" onclick="setDifficulty('hard', this)">Hard</button>
                    </div>
                </div>
            </div>

            <div class="high-score-box" id="highScoreBox">
                <div class="hs-label">🏆 HIGH SCORE</div>
                <div class="hs-value" id="highScoreValue">0</div>
            </div>

            <div class="controls-hint">
                <span>⌨️ Arrow Keys / WASD</span>
                <span>📱 Swipe on Mobile</span>
            </div>
        </div>
    </div>

    <!-- ====== GAME SCREEN ====== -->
    <div class="screen" id="gameScreen">
        <div class="game-hud">
            <div class="hud-item">
                <span class="hud-label">Score</span>
                <span class="hud-val" id="currentScore">0</span>
            </div>
            <div class="hud-item hud-center">
                <span class="hud-label">Best</span>
                <span class="hud-val" id="bestScore">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label" id="powerLabel">—</span>
                <span class="hud-val hud-power" id="powerTimer">—</span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- ====== GAME OVER OVERLAY ====== -->
    <div class="overlay" id="gameOverOverlay">
        <div class="overlay-card">
            <div class="go-emoji" id="goEmoji">💀</div>
            <h2 class="go-title">Game Over</h2>
            <div class="go-score-wrap">
                <div class="go-score">
                    <span class="go-score-label">Score</span>
                    <span class="go-score-value" id="finalScore">0</span>
                </div>
                <div class="go-score">
                    <span class="go-score-label">Best</span>
                    <span class="go-score-value go-best" id="finalBest">0</span>
                </div>
            </div>
            <div class="go-new-record hidden" id="newRecord">🎉 NEW RECORD!</div>
            <button class="btn-play btn-retry" onclick="startGame()">
                <span class="btn-icon">🔄</span> PLAY AGAIN
            </button>
            <button class="btn-menu" onclick="goToMenu()">Main Menu</button>

            <div class="leaderboard" id="leaderboard">
                <h3 class="lb-title">🏆 Leaderboard</h3>
                <ol class="lb-list" id="lbList"></ol>
            </div>
        </div>
    </div>

    <!-- ====== PAUSE OVERLAY ====== -->
    <div class="overlay" id="pauseOverlay">
        <div class="overlay-card pause-card">
            <div class="go-emoji">⏸️</div>
            <h2 class="go-title">Paused</h2>
            <button class="btn-play btn-retry" onclick="resumeGame()">
                <span class="btn-icon">▶</span> RESUME
            </button>
            <button class="btn-menu" onclick="goToMenu()">Main Menu</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
