<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <div class="app" id="app">
      <!-- Main Calculator -->
      <section class="calculator main-calc" aria-label="Main Calculator">
        <div class="display-wrap">
          <div class="mode-row">
            <span class="calc-label">CALCULATOR</span>
            <div class="sci-btn-wrap">
              <button id="scientificToggle" class="mode-btn" aria-pressed="false">
                Scientific
              </button>
            </div>
          </div>
          <input id="display" class="display" type="text" value="0" readonly />
        </div>

        <div class="keys main-keys">
          <button class="btn control" data-action="clear">C</button>
          <button class="btn control" data-action="backspace">⌫</button>
          <button class="btn op" data-value="(">(</button>
          <button class="btn op" data-value=")">)</button>

          <button class="btn" data-value="7">7</button>
          <button class="btn" data-value="8">8</button>
          <button class="btn" data-value="9">9</button>
          <button class="btn op" data-value="/">÷</button>

          <button class="btn" data-value="4">4</button>
          <button class="btn" data-value="5">5</button>
          <button class="btn" data-value="6">6</button>
          <button class="btn op" data-value="*">×</button>

          <button class="btn" data-value="1">1</button>
          <button class="btn" data-value="2">2</button>
          <button class="btn" data-value="3">3</button>
          <button class="btn op" data-value="-">−</button>

          <button class="btn" data-value="0">0</button>
          <button class="btn" data-value=".">.</button>
          <button class="btn equals" data-action="equals">=</button>
          <button class="btn op" data-value="+">+</button>
        </div>
      </section>

      <!-- Scientific Calculator -->
      <section class="calculator sci-calc" aria-label="Scientific Calculator">
        <div class="display-wrap sci-title-wrap">
          <div class="sci-title">Scientific Functions</div>
        </div>

        <div class="keys sci-keys">
          <button class="btn sci" data-fn="sin">sin</button>
          <button class="btn sci" data-fn="cos">cos</button>
          <button class="btn sci" data-fn="tan">tan</button>
          <button class="btn sci" data-fn="log">log</button>
          <button class="btn sci" data-fn="ln">ln</button>

          <button class="btn sci" data-fn="asin">asin</button>
          <button class="btn sci" data-fn="acos">acos</button>
          <button class="btn sci" data-fn="atan">atan</button>
          <button class="btn sci" data-fn="sqrt">√</button>
          <button class="btn sci" data-fn="pow2">x²</button>

          <button class="btn sci" data-fn="powY">xʸ</button>
          <button class="btn sci" data-fn="factorial">!</button>
          <button class="btn sci" data-fn="percent">%</button>
          <button class="btn sci" data-fn="reciprocal">1/x</button>
          <button class="btn sci" data-fn="exp">exp</button>

          <button class="btn sci" data-fn="abs">abs</button>
          <button class="btn sci" data-fn="negate">±</button>
          <button class="btn sci" data-fn="pi">π</button>
          <button class="btn sci" data-fn="econst">e</button>
          <button class="btn sci" data-value="(">(</button>

          <button class="btn sci" data-value=")">)</button>
          <button class="btn sci" data-fn="ceil">ceil</button>
          <button class="btn sci" data-fn="floor">floor</button>
          <button class="btn sci" data-fn="cbrt">∛</button>
          <button class="btn sci" data-fn="log2">log₂</button>
        </div>
      </section>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
