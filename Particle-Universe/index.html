<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Particle Universe — An extreme interactive particle animation with gravity, visual themes, and mind-blowing effects">
    <title>🌌 Particle Universe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background starfield canvas -->
    <canvas id="bgCanvas"></canvas>
    <!-- Main particle canvas -->
    <canvas id="mainCanvas"></canvas>

    <!-- FPS Counter -->
    <div id="fpsCounter">
        <span id="fpsValue">60</span> FPS
    </div>

    <!-- Title overlay (fades out) -->
    <div id="titleOverlay">
        <h1>PARTICLE UNIVERSE</h1>
        <p>Move your mouse to interact · Click to explode · Double-click for shockwave</p>
        <p class="hint">Press <kbd>H</kbd> to toggle controls</p>
    </div>

    <!-- Control Panel -->
    <div id="controlPanel" class="glass-panel">
        <div id="panelToggle" title="Toggle Controls (H)">
            <span class="toggle-icon">⚙</span>
        </div>
        <div id="panelContent">
            <h2>CONTROLS</h2>

            <!-- Interaction Mode -->
            <div class="control-group">
                <label>INTERACTION MODE</label>
                <div class="mode-grid" id="modeGrid">
                    <button class="mode-btn active" data-mode="attract" id="btnAttract">
                        <span class="mode-icon">🌀</span>
                        <span>Attract</span>
                    </button>
                    <button class="mode-btn" data-mode="repel" id="btnRepel">
                        <span class="mode-icon">💥</span>
                        <span>Repel</span>
                    </button>
                    <button class="mode-btn" data-mode="vortex" id="btnVortex">
                        <span class="mode-icon">🌪</span>
                        <span>Vortex</span>
                    </button>
                    <button class="mode-btn" data-mode="create" id="btnCreate">
                        <span class="mode-icon">✨</span>
                        <span>Create</span>
                    </button>
                    <button class="mode-btn" data-mode="blackhole" id="btnBlackhole">
                        <span class="mode-icon">⚫</span>
                        <span>Black Hole</span>
                    </button>
                    <button class="mode-btn" data-mode="connect" id="btnConnect">
                        <span class="mode-icon">🔗</span>
                        <span>Connect</span>
                    </button>
                </div>
            </div>

            <!-- Visual Theme -->
            <div class="control-group">
                <label>VISUAL THEME</label>
                <div class="theme-grid" id="themeGrid">
                    <button class="theme-btn active" data-theme="nebula" id="btnNebula">
                        <span class="theme-dot nebula-dot"></span> Nebula
                    </button>
                    <button class="theme-btn" data-theme="aurora" id="btnAurora">
                        <span class="theme-dot aurora-dot"></span> Aurora
                    </button>
                    <button class="theme-btn" data-theme="inferno" id="btnInferno">
                        <span class="theme-dot inferno-dot"></span> Inferno
                    </button>
                    <button class="theme-btn" data-theme="ocean" id="btnOcean">
                        <span class="theme-dot ocean-dot"></span> Ocean
                    </button>
                    <button class="theme-btn" data-theme="cosmic" id="btnCosmic">
                        <span class="theme-dot cosmic-dot"></span> Cosmic
                    </button>
                    <button class="theme-btn" data-theme="matrix" id="btnMatrix">
                        <span class="theme-dot matrix-dot"></span> Matrix
                    </button>
                    <button class="theme-btn" data-theme="void" id="btnVoid">
                        <span class="theme-dot void-dot"></span> Void
                    </button>
                </div>
            </div>

            <!-- Sliders -->
            <div class="control-group">
                <label>PARTICLES <span id="particleCountLabel" class="slider-value">300</span></label>
                <input type="range" id="particleCount" min="50" max="800" value="300" class="neon-slider">
            </div>

            <div class="control-group">
                <label>GRAVITY <span id="gravityLabel" class="slider-value">50</span></label>
                <input type="range" id="gravity" min="0" max="100" value="50" class="neon-slider">
            </div>

            <div class="control-group">
                <label>TRAIL LENGTH <span id="trailLabel" class="slider-value">70</span></label>
                <input type="range" id="trailLength" min="0" max="100" value="70" class="neon-slider">
            </div>

            <div class="control-group">
                <label>CONNECTION DIST <span id="connectionLabel" class="slider-value">120</span></label>
                <input type="range" id="connectionDist" min="30" max="250" value="120" class="neon-slider">
            </div>

            <div class="control-group">
                <label>PARTICLE SIZE <span id="particleSizeLabel" class="slider-value">3</span></label>
                <input type="range" id="particleSize" min="1" max="8" value="3" step="0.5" class="neon-slider">
            </div>

            <!-- Action Buttons -->
            <div class="control-group actions">
                <button id="btnFullscreen" class="action-btn" title="Toggle Fullscreen (F)">⛶ Fullscreen</button>
                <button id="btnReset" class="action-btn" title="Reset Particles (R)">↻ Reset</button>
            </div>

            <div class="control-group shortcuts">
                <p><kbd>1-6</kbd> Modes · <kbd>Q-U</kbd> Themes</p>
                <p><kbd>Space</kbd> Pause · <kbd>F</kbd> Fullscreen</p>
            </div>
        </div>
    </div>

    <!-- Pause overlay -->
    <div id="pauseOverlay" class="hidden">
        <span>⏸ PAUSED</span>
    </div>

    <script src="game.js"></script>
</body>
</html>
