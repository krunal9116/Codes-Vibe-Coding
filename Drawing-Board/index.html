<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drawing Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- ── TOP TOOLBAR ─────────────────────── -->
    <header class="top-toolbar">

      <!-- Logo -->
      <div class="logo">🎨</div>
      <div class="sep"></div>

      <!-- Tools -->
      <div class="tool-group">
        <button class="tool-btn active" data-tool="brush" title="Brush">
          <svg viewBox="0 0 24 24"><path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92 1.22 2.49 2 4 2 2.21 0 4-1.79 4-4 0-1.66-1.34-3-3-3zm13.71-9.37l-1.34-1.34a1 1 0 0 0-1.41 0L9 12.25 11.75 15l8.96-8.96a1 1 0 0 0 0-1.41z"/></svg>
          <span>Brush</span>
        </button>
        <button class="tool-btn" data-tool="pencil" title="Pencil">
          <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          <span>Pencil</span>
        </button>
        <button class="tool-btn" data-tool="eraser" title="Eraser">
          <svg viewBox="0 0 24 24"><path d="M15.14 3c-.51 0-1.02.2-1.41.59L2.59 14.73c-.78.77-.78 2.04 0 2.83L5.03 20H20v-2h-6.23l7.14-7.17c.78-.78.78-2.05 0-2.83l-4.36-4.41c-.39-.39-.9-.59-1.41-.59zm-.01 2.41 4.36 4.37-3.01 3.02-4.36-4.37 3.01-3.02z"/></svg>
          <span>Eraser</span>
        </button>
        <button class="tool-btn" data-tool="fill" title="Fill Bucket">
          <svg viewBox="0 0 24 24"><path d="M16.56 8.94 7.62 0 6.21 1.41l2.38 2.38-5.15 5.15a1.49 1.49 0 0 0 0 2.12l5.5 5.5c.29.29.68.44 1.06.44s.77-.15 1.06-.44l5.5-5.5c.59-.58.59-1.53 0-2.12zM5.21 10 10 5.21 14.79 10H5.21zM19 11.5s-2 2.17-2 3.5c0 1.1.9 2 2 2s2-.9 2-2c0-1.33-2-3.5-2-3.5z"/><path d="M0 20h24v4H0z" opacity=".36"/></svg>
          <span>Fill</span>
        </button>
        <button class="tool-btn" data-tool="eyedropper" title="Color Picker">
          <svg viewBox="0 0 24 24"><path d="M20.71 5.63l-2.34-2.34a1 1 0 0 0-1.41 0l-3.12 3.12-1.41-1.42-1.42 1.42 1.41 1.41-6.6 6.6A2 2 0 0 0 5 16v3h3a2 2 0 0 0 1.42-.59l6.6-6.6 1.41 1.42 1.42-1.42-1.42-1.41 3.12-3.12a1 1 0 0 0 0-1.65zM7 17v-1.46l6.31-6.31 1.41 1.41L8.42 17H7z"/></svg>
          <span>Picker</span>
        </button>
        <button class="tool-btn" data-tool="line" title="Line">
          <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
          <span>Line</span>
        </button>
        <button class="tool-btn" data-tool="rect" title="Rectangle">
          <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>Rect</span>
        </button>
        <button class="tool-btn" data-tool="circle" title="Circle">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>Circle</span>
        </button>
        <button class="tool-btn" data-tool="triangle" title="Triangle">
          <svg viewBox="0 0 24 24"><polygon points="12,3 21,21 3,21" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          <span>Triangle</span>
        </button>
        <button class="tool-btn" data-tool="text" title="Text">
          <svg viewBox="0 0 24 24"><path d="M5 4v3h5.5v12h3V7H19V4z"/></svg>
          <span>Text</span>
        </button>
      </div>
      <div class="sep"></div>

      <!-- Brush type -->
      <div class="ctrl-group">
        <span class="ctrl-label">Brush</span>
        <div class="brush-types">
          <button class="brush-type-btn active" data-brush="round" title="Round">●</button>
          <button class="brush-type-btn" data-brush="square" title="Square">■</button>
          <button class="brush-type-btn" data-brush="spray" title="Spray">✦</button>
          <button class="brush-type-btn" data-brush="marker" title="Marker">▬</button>
        </div>
      </div>
      <div class="sep"></div>

      <!-- Size -->
      <div class="ctrl-group">
        <span class="ctrl-label">Size <b id="size-display">10px</b></span>
        <input type="range" id="brush-size" min="1" max="80" value="10" />
      </div>

      <!-- Opacity -->
      <div class="ctrl-group">
        <span class="ctrl-label">Opacity <b id="opacity-display">100%</b></span>
        <input type="range" id="brush-opacity" min="1" max="100" value="100" />
      </div>
      <div class="sep"></div>

      <!-- Fill shapes -->
      <label class="fill-toggle" title="Fill closed shapes">
        <input type="checkbox" id="fill-shape" />
        <span>Fill shapes</span>
      </label>
      <div class="sep"></div>

      <!-- Text controls (shown only when text tool active) -->
      <div class="text-controls" id="text-controls" style="display:none">
        <select id="font-family">
          <option>Arial</option><option>Georgia</option><option>Courier New</option>
          <option>Impact</option><option>Comic Sans MS</option><option>Verdana</option>
        </select>
        <select id="font-size">
          <option value="16">16</option><option value="24">24</option>
          <option value="32" selected>32</option><option value="48">48</option>
          <option value="64">64</option><option value="96">96</option>
        </select>
        <button id="font-bold"   class="font-btn" title="Bold">B</button>
        <button id="font-italic" class="font-btn" title="Italic"><i>I</i></button>
        <div class="sep"></div>
      </div>

      <!-- Spacer -->
      <div style="flex:1"></div>

      <!-- Actions -->
      <button class="action-btn" id="btn-undo" title="Undo (Ctrl+Z)">↩ Undo</button>
      <button class="action-btn" id="btn-redo" title="Redo (Ctrl+Y)">↪ Redo</button>
      <button class="action-btn" id="btn-clear" title="Clear Canvas">🗑 Clear</button>
      <button class="action-btn primary" id="btn-save" title="Save as PNG (Ctrl+S)">💾 Save PNG</button>
    </header>

    <!-- ── CANVAS AREA ──────────────────────── -->
    <main class="canvas-area">
      <div class="canvas-wrapper" id="canvas-wrapper">
        <canvas id="main-canvas"></canvas>
        <canvas id="overlay-canvas"></canvas>
        <input type="text" id="text-input" placeholder="Type & press Enter…" />
      </div>
    </main>

    <!-- ── BOTTOM BAR ──────────────────────── -->
    <footer class="bottom-bar">
      <!-- Active colors -->
      <div class="active-colors">
        <div class="color-box secondary" id="bg-color-box" title="Fill color (click to pick)"></div>
        <div class="color-box primary"   id="fg-color-box" title="Stroke color (click to pick)"></div>
      </div>
      <button class="swap-btn" id="swap-colors" title="Swap stroke ↔ fill">⇄</button>

      <label class="picker-label">
        <span>Stroke</span>
        <input type="color" id="stroke-color" value="#000000" />
      </label>
      <label class="picker-label">
        <span>Fill</span>
        <input type="color" id="fill-color" value="#ff6b6b" />
      </label>

      <div class="sep"></div>

      <!-- Palette -->
      <div class="palette" id="palette"></div>

      <div class="sep"></div>

      <!-- Canvas info -->
      <span class="canvas-info" id="canvas-info">1200 × 700</span>

      <!-- Zoom -->
      <div class="zoom-controls">
        <button id="zoom-out" title="Zoom out">－</button>
        <span id="zoom-level">100%</span>
        <button id="zoom-in" title="Zoom in">＋</button>
        <button id="zoom-reset" title="Reset zoom">↺</button>
      </div>
    </footer>

  </div>
  <script src="app.js"></script>
</body>
</html>
