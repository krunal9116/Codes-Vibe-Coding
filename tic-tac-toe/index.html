<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe – Ultimate Edition</title>
    <meta name="description" content="Play Tic Tac Toe against a friend or the computer with stunning animations and a premium design.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background particles -->
    <div class="bg-particles" id="bgParticles"></div>

    <!-- ========== MENU SCREEN ========== -->
    <div class="screen active" id="menuScreen">
        <div class="menu-container">
            <div class="logo">
                <span class="logo-x">X</span>
                <span class="logo-separator">&</span>
                <span class="logo-o">O</span>
            </div>
            <h1 class="title">Tic Tac Toe</h1>
            <p class="subtitle">Choose your battle mode</p>

            <div class="mode-cards">
                <button class="mode-card" id="btnVsFriend" onclick="startGame('friend')">
                    <div class="mode-icon">👥</div>
                    <div class="mode-label">VS Friend</div>
                    <div class="mode-desc">Play locally with a friend</div>
                </button>
                <button class="mode-card" id="btnVsComputer" onclick="startGame('computer')">
                    <div class="mode-icon">🤖</div>
                    <div class="mode-label">VS Computer</div>
                    <div class="mode-desc">Challenge the AI</div>
                </button>
            </div>
        </div>
    </div>

    <!-- ========== GAME SCREEN ========== -->
    <div class="screen" id="gameScreen">
        <div class="game-container">
            <div class="game-header">
                <button class="btn-back" id="btnBack" onclick="goToMenu()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    Menu
                </button>
                <div class="game-mode-badge" id="modeBadge">VS Friend</div>
            </div>

            <div class="scoreboard">
                <div class="score-item score-x">
                    <div class="score-label" id="labelX">Player X</div>
                    <div class="score-value" id="scoreX">0</div>
                </div>
                <div class="score-item score-draw">
                    <div class="score-label">Draw</div>
                    <div class="score-value" id="scoreDraw">0</div>
                </div>
                <div class="score-item score-o">
                    <div class="score-label" id="labelO">Player O</div>
                    <div class="score-value" id="scoreO">0</div>
                </div>
            </div>

            <div class="turn-indicator">
                <span id="turnText">Player X's Turn</span>
                <div class="turn-dot" id="turnDot"></div>
            </div>

            <div class="board" id="board">
                <div class="cell" data-index="0" onclick="handleCellClick(0)"></div>
                <div class="cell" data-index="1" onclick="handleCellClick(1)"></div>
                <div class="cell" data-index="2" onclick="handleCellClick(2)"></div>
                <div class="cell" data-index="3" onclick="handleCellClick(3)"></div>
                <div class="cell" data-index="4" onclick="handleCellClick(4)"></div>
                <div class="cell" data-index="5" onclick="handleCellClick(5)"></div>
                <div class="cell" data-index="6" onclick="handleCellClick(6)"></div>
                <div class="cell" data-index="7" onclick="handleCellClick(7)"></div>
                <div class="cell" data-index="8" onclick="handleCellClick(8)"></div>
                <div class="win-line" id="winLine"></div>
            </div>

            <button class="btn-restart" id="btnRestart" onclick="restartGame()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                New Round
            </button>
        </div>
    </div>

    <!-- ========== RESULT OVERLAY ========== -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-card" id="resultCard">
            <div class="result-emoji" id="resultEmoji"></div>
            <div class="result-title" id="resultTitle"></div>
            <div class="result-subtitle" id="resultSubtitle"></div>
            <button class="btn-play-again" onclick="restartGame()">Play Again</button>
            <button class="btn-menu-link" onclick="goToMenu()">Back to Menu</button>
        </div>
    </div>

    <!-- Confetti canvas -->
    <canvas id="confettiCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
