<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Neon Dash — A premium 2D side-scrolling platformer with physics, enemies, collectibles, and stunning neon visuals.">
    <title>Neon Dash — 2D Platformer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Menu -->
    <div id="menu">
        <div class="menu-content">
            <h1 class="game-title">NEON<span>DASH</span></h1>
            <p class="subtitle">A 2D Platformer Adventure</p>
            <div class="menu-buttons">
                <button id="btnPlay" class="menu-btn primary">▶ PLAY</button>
                <button id="btnControls" class="menu-btn">⌨ CONTROLS</button>
            </div>
            <div id="controlsPanel" class="controls-info hidden">
                <div class="key-row"><span class="key">A / ←</span> Move Left</div>
                <div class="key-row"><span class="key">D / →</span> Move Right</div>
                <div class="key-row"><span class="key">W / ↑ / Space</span> Jump</div>
                <div class="key-row"><span class="key">W / ↑ (in air)</span> Double Jump</div>
                <div class="key-row"><span class="key">Wall + Jump</span> Wall Jump</div>
            </div>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud" class="hidden">
        <div class="hud-left">
            <div class="hud-hearts" id="hearts">♥♥♥</div>
            <div class="hud-level">Level <span id="levelNum">1</span></div>
        </div>
        <div class="hud-center">
            <div class="hud-score">
                <span class="coin-icon">◆</span>
                <span id="scoreValue">0</span>
            </div>
        </div>
        <div class="hud-right">
            <div class="hud-time" id="timeValue">0:00</div>
        </div>
    </div>

    <!-- Level Complete Overlay -->
    <div id="levelComplete" class="overlay hidden">
        <div class="overlay-card">
            <h2>LEVEL COMPLETE!</h2>
            <div class="stats-grid">
                <div class="stat-item"><span class="stat-label">Coins</span><span class="stat-val" id="lcCoins">0</span></div>
                <div class="stat-item"><span class="stat-label">Time</span><span class="stat-val" id="lcTime">0:00</span></div>
                <div class="stat-item"><span class="stat-label">Score</span><span class="stat-val" id="lcScore">0</span></div>
            </div>
            <button id="btnNextLevel" class="menu-btn primary">NEXT LEVEL →</button>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="gameOver" class="overlay hidden">
        <div class="overlay-card">
            <h2>GAME OVER</h2>
            <p class="go-score">Score: <span id="goScore">0</span></p>
            <button id="btnRetry" class="menu-btn primary">↻ RETRY</button>
            <button id="btnMenu" class="menu-btn">⟵ MENU</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
