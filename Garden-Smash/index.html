<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Smash – Whack-a-Mole</title>
    <meta name="description" content="A cheerful garden-themed whack-a-mole game with combo multipliers, mole types, and timed rounds.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Clouds -->
    <div class="clouds" id="clouds"></div>

    <!-- ====== MENU SCREEN ====== -->
    <div class="screen active" id="menuScreen">
        <div class="menu-card">
            <div class="brand">
                <div class="brand-icon">🔨</div>
                <h1 class="brand-title">GARDEN<span>SMASH</span></h1>
                <p class="brand-sub">Whack · Combo · Score</p>
            </div>

            <div class="picker-section">
                <span class="picker-label">Difficulty</span>
                <div class="diff-btns" id="diffBtns">
                    <button class="diff-btn active" onclick="pickDiff(0,this)">Easy<small>30s</small></button>
                    <button class="diff-btn" onclick="pickDiff(1,this)">Medium<small>30s</small></button>
                    <button class="diff-btn" onclick="pickDiff(2,this)">Hard<small>30s</small></button>
                </div>
            </div>

            <button class="btn-play" onclick="startGame()">🔨 Start Smashing!</button>

            <div class="best-box">
                <div class="best-row"><span>🏆 Best (Easy)</span><span id="bestEasy">0</span></div>
                <div class="best-row"><span>🏆 Best (Medium)</span><span id="bestMed">0</span></div>
                <div class="best-row"><span>🏆 Best (Hard)</span><span id="bestHard">0</span></div>
            </div>

            <p class="hint-text">🖱️ Click / Tap moles to whack &nbsp;|&nbsp; Esc — Pause</p>
        </div>
    </div>

    <!-- ====== GAME SCREEN ====== -->
    <div class="screen" id="gameScreen">
        <div class="game-hud">
            <div class="hud-item"><span class="hud-lbl">Score</span><span class="hud-v" id="hudScore">0</span></div>
            <div class="hud-item"><span class="hud-lbl">Time</span><span class="hud-v" id="hudTime">30</span></div>
            <div class="hud-item"><span class="hud-lbl">Combo</span><span class="hud-v" id="hudCombo">—</span></div>
        </div>
        <div class="grid-area">
            <div class="mole-grid" id="moleGrid"></div>
        </div>
    </div>

    <!-- ====== GAME OVER OVERLAY ====== -->
    <div class="overlay" id="gameOverOverlay">
        <div class="overlay-card">
            <div class="ov-icon" id="goEmoji">🏆</div>
            <h2 class="ov-title">Time's Up!</h2>
            <div class="stars" id="starDisplay">⭐⭐⭐</div>
            <div class="go-stats">
                <div class="gs-item"><span class="gs-lbl">Score</span><span class="gs-val" id="goScore">0</span></div>
                <div class="gs-item"><span class="gs-lbl">Whacked</span><span class="gs-val" id="goWhacked">0</span></div>
                <div class="gs-item"><span class="gs-lbl">Accuracy</span><span class="gs-val" id="goAccuracy">0%</span></div>
            </div>
            <div class="new-record hidden" id="newRecord">🏆 NEW RECORD!</div>
            <button class="btn-play btn-again" onclick="startGame()">🔄 Play Again</button>
            <button class="btn-secondary" onclick="goToMenu()">Main Menu</button>
        </div>
    </div>

    <!-- ====== PAUSE OVERLAY ====== -->
    <div class="overlay" id="pauseOverlay">
        <div class="overlay-card">
            <div class="ov-icon">⏸️</div>
            <h2 class="ov-title">Paused</h2>
            <button class="btn-play btn-again" onclick="resumeGame()">▶ Resume</button>
            <button class="btn-secondary" onclick="goToMenu()">Main Menu</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
